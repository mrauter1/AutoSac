<form
  method="get"
  action="{{ filters_action }}"
  class="panel ops-filters"
  hx-get="{{ filters_action }}"
  hx-target="#{{ filters_target_id }}"
  hx-push-url="true"
>
  <div class="ops-filters__grid">
    <label class="field">
      <span>Status</span>
      <select name="status">
        <option value="">All statuses</option>
        {% for value in status_options %}
        <option value="{{ value }}" {% if filters.status == value %}selected{% endif %}>{{ ops_status_label(value) }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="field">
      <span>Class</span>
      <select name="ticket_class">
        <option value="">All classes</option>
        {% for value in class_options %}
        <option value="{{ value }}" {% if filters.ticket_class == value %}selected{% endif %}>{{ value.replace("_", " ").title() }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="field">
      <span>Assigned to</span>
      <select name="assigned_to">
        <option value="">Anyone</option>
        <option value="unassigned" {% if filters.assigned_to == "unassigned" %}selected{% endif %}>Unassigned</option>
        {% for user in ops_users %}
        <option value="{{ user.id }}" {% if filters.assigned_to == user.id|string %}selected{% endif %}>{{ user.display_name }}</option>
        {% endfor %}
      </select>
    </label>
  </div>
  <div class="ops-filters__checks">
    <label class="checkbox">
      <input type="checkbox" name="urgent" {% if filters.urgent %}checked{% endif %}>
      <span>Urgent only</span>
    </label>
    <label class="checkbox">
      <input type="checkbox" name="unassigned_only" {% if filters.unassigned_only %}checked{% endif %}>
      <span>Unassigned only</span>
    </label>
    <label class="checkbox">
      <input type="checkbox" name="created_by_me" {% if filters.created_by_me %}checked{% endif %}>
      <span>Created by me</span>
    </label>
    <label class="checkbox">
      <input type="checkbox" name="needs_approval" {% if filters.needs_approval %}checked{% endif %}>
      <span>Needs approval</span>
    </label>
    <label class="checkbox">
      <input type="checkbox" name="updated_since_viewed" {% if filters.updated_since_viewed %}checked{% endif %}>
      <span>Updated since my last view</span>
    </label>
  </div>
  <div class="button-row">
    <button type="submit" class="button">Apply filters</button>
    <a class="button button--ghost" href="{{ filters_action }}">Reset</a>
  </div>
</form>
