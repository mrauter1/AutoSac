    acceptance_criteria:
      - id: AC-1
        text: No code path depends on task/run run_log.md or run summary.md.
      - id: AC-2
        text: Focused regression tests cover scaffold layout, prompt sourcing, decisions behavior, clarification flow, and verifier scope enforcement.
    deliverables:
