  - phase_id: shared-prompt-loading-and-artifact-ownership-split
    title: Load prompts from shared templates and split artifact ownership rules
    objective: Source prompt text directly from shared templates in memory and separate tracked Superloop artifacts from verifier-exempt runtime bookkeeping.
    status: planned
    in_scope:
      - Refactor build_phase_prompt(...) and run_codex_phase(...) to consume rendered template text or template provenance without task-local prompt files.
      - Add the authoritative decisions.txt path to all prompt preambles.
      - Split tracked artifact helpers from verifier-exempt runtime artifact helpers so decisions.txt is tracked but not verifier-exempt.
    out_of_scope:
      - Runtime decisions block append behavior.
      - Clarification question and answer persistence in decisions.txt.
    dependencies:
      - template-and-artifact-contract-alignment
    acceptance_criteria:
      - id: AC-1
        text: No run_codex_phase(...) call site depends on task-local prompt.md or verifier_prompt.md files.
      - id: AC-2
        text: Verifier scope enforcement still flags edits to decisions.txt while runtime bookkeeping artifacts remain exempt.
    deliverables:
      - Refactored prompt-building/orchestration code in superloop.py.
      - Updated artifact helper functions and related tests.
      - Raw-log prompt provenance updated to shared template provenance.
    risks:
      - Path rendering could regress if prompt templates are not rendered against task_root_rel before execution.
      - Over-broad verifier exemptions could hide invalid edits.
    rollback:
      - Revert prompt-loading and artifact-helper changes together if prompts or verifier scope checks break.
  - phase_id: decisions-ledger-runtime-integration
    title: Integrate runtime-managed decisions ledger behavior
    objective: Add deterministic decisions header parsing and append flows for producer turns and clarification question/answer history.
    status: planned
    in_scope:
      - Add decisions.txt header parsing, sequence allocation, append helpers, and empty trailing producer-block cleanup.
      - Pre-create producer headers for planner, implementer, and test author turns.
      - Append runtime questions and answers blocks from append_clarification(...) and preserve prompt-defined question bodies.
    out_of_scope:
      - Additional compaction, migration, or manifest systems for decisions history.
      - Any verifier write path to decisions.txt.
    dependencies:
      - shared-prompt-loading-and-artifact-ownership-split
    acceptance_criteria:
      - id: AC-1
        text: Only planner, implementer, and test-author turns receive runtime-created producer headers; verifier turns never receive producer headers because decisions.txt remains verifier read-only.
      - id: AC-2
        text: For producer question turns, runtime removes any empty trailing producer block before appending the runtime questions block and later appends the matching answers block, preserving the required append-only ordering and qa_seq linkage without changing raw-log authority.
    deliverables:
      - Decisions helper functions and orchestration integration in superloop.py.
      - Tests for header parsing, sequencing, clarification appends, and empty-block cleanup.
    risks:
      - Incorrect sequence allocation or block trimming could corrupt append-only history semantics.
      - Question formatting changes could duplicate or distort best-supposition lines.
    rollback:
      - Revert decisions-helper integration as one unit if append ordering or sequence semantics prove unstable.
