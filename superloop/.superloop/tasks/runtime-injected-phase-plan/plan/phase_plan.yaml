version: 1
task_id: runtime-injected-phase-plan
request_snapshot_ref: /workspace/superloop/.superloop/tasks/runtime-injected-phase-plan/runs/run-20260321T224000Z-8e6697b8/request.md
phases:
  - phase_id: runtime-owned-phase-plan-contract
    title: Runtime-owned phase plan metadata and validation contract
    objective: Update plan orchestration, prompt contracts, validator defaults, and tests so `phase_plan.yaml` metadata is runtime-owned and planner-authored content is limited to `phases`.
    status: planned
    in_scope:
      - Add runtime scaffolding for `phase_plan.yaml` using authoritative `version`, `task_id`, and `request_snapshot_ref` values.
      - Update planner and verifier prompt text so runtime-owned metadata keys are not planner-authored and metadata drift is blocking.
      - Relax validation for omitted optional list fields while keeping `in_scope` and `deliverables` required and non-empty.
      - Add regression tests for scaffold creation, metadata preservation/immutability expectations, and optional-list defaults.
    out_of_scope:
      - Reworking phase selection semantics beyond consuming the explicit plan generated by the planning flow.
      - Rewriting previously materialized custom task prompt files in existing task workspaces.
      - Changing implicit single-phase fallback behavior for runs that skip the plan pair.
    dependencies: []
    acceptance_criteria:
      - id: AC-1
        text: Plan execution seeds an explicit `phase_plan.yaml` with authoritative runtime-owned metadata after the current run request snapshot exists.
      - id: AC-2
        text: Planner prompt text instructs agents to author `phases` only and explicitly forbids editing runtime-owned metadata keys.
      - id: AC-3
        text: Verifier prompt text treats incorrect `version`, `task_id`, or `request_snapshot_ref` values as a blocking issue.
      - id: AC-4
        text: "`validate_phase_plan()` accepts omitted optional list fields as empty values while still rejecting missing or empty `in_scope` and `deliverables`."
      - id: AC-5
        text: Regression tests cover scaffold content/timing, metadata preservation behavior, and optional-list parsing.
    deliverables:
      - Updated orchestration, prompt text, and validator behavior in `superloop.py`
      - Regression coverage in `tests/test_superloop_observability.py` and/or `tests/test_phase_local_behavior.py`
    risks:
      - Incorrect scaffold timing could create an invalid explicit plan in flows that should still use the implicit fallback.
      - Metadata normalization at the wrong point could mask planner edits before verifier review.
      - Existing task-local prompt artifacts will not pick up new template text automatically.
    rollback:
      - Revert scaffold creation to the pre-plan explicit-plan absence behavior if implement/test-only flows regress.
      - Revert the validator defaulting change if downstream consumers unexpectedly require explicit optional keys.
