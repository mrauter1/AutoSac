phases:
- phase_id: dm-persistence-runtime-foundation
  title: DM Persistence and Runtime Foundation
  objective: Add the persisted Slack DM schema, replace env-backed Slack runtime loading,
    and provide the token crypto and health primitives that later UI, emission, and
    worker phases reuse.
  status: planned
  in_scope:
  - Create slack_dm_settings and users.slack_user_id plus DM recipient columns and
    constraints on integration_event_targets.
  - Clear disposable pre-launch Slack integration rows during migration so DM-only
    target semantics can be enforced safely.
  - Retire authoritative SLACK_* env parsing and introduce DB-backed Slack DM load,
    save, validation, token crypto, and health helpers.
  - Rework SlackRuntimeContext construction so request transactions and worker cycles
    load current DB-backed Slack config instead of startup-time webhook settings.
  out_of_scope:
  - Admin HTML, nav, and form work.
  - Recipient routing inserts in shared/integrations.py.
  - Slack Web API send logic in worker/slack_delivery.py.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: The schema includes slack_dm_settings, users.slack_user_id, recipient_user_id,
      and recipient_reason, and the migration can run on pre-launch databases without
      requiring webhook-row compatibility.
  - id: AC-2
    text: There is no authoritative env-driven Slack runtime path left; request and
      worker code can load effective Slack DM defaults and persisted config from PostgreSQL.
  - id: AC-3
    text: Token encryption and decryption use APP_SECRET_KEY-derived key material,
      and delivery-health snapshots can be persisted for UI display without making
      health state the routing source of truth.
  deliverables:
  - New migration and shared/models.py updates for Slack DM settings, user Slack IDs,
    and DM recipient target fields
  - requirements.txt update plus shared Slack DM settings and Web API helper module
    with validation and token crypto
  - Runtime-context loader changes for request and worker flows
  risks:
  - Existing webhook dry-run rows can block NOT NULL DM recipient columns unless they
    are cleared deliberately.
  - Leaving Settings.slack in place risks two competing runtime contracts.
  - Token crypto and decryption failure handling can leak into logs if sanitization
    is not centralized.
  rollback:
  - Keep Slack disabled in the DB and revert code while leaving additive schema in
    place if the new runtime foundation regresses.
  - Do not add a webhook compatibility bridge as rollback handling.
- phase_id: admin-ui-and-user-mapping
  title: Admin UI and User Slack Mapping
  objective: Ship the admin-only Slack integration screen and extend the existing
    ops-users surface so admins can manage Slack IDs without exposing new controls
    to non-admins.
  status: planned
  in_scope:
  - Add require_admin_user and the /ops/integrations/slack GET, save, and disconnect
    routes.
  - Add the Slack integration template, nav entry, locale-aware errors, required
    i18n strings, and required Slack bot scope or capability guidance.
  - Extend /ops/users create or update flows and shared/user_admin.py with optional
    slack_user_id validation, trimming, clear behavior, and uniqueness.
  - Enforce that only admins can change slack_user_id, even if a non-admin submits
    the field manually.
  out_of_scope:
  - Recipient routing inserts for business events.
  - Worker DM send-time behavior and retry classification.
  - Historical data backfill or Slack user autodiscovery.
  dependencies:
  - dm-persistence-runtime-foundation
  acceptance_criteria:
  - id: AC-1
    text: Admins can load, save, and disconnect Slack DM settings from /ops/integrations/slack,
      with blank-token preservation, auth.test validation for new tokens, explicit
      required-scope guidance, disconnect behavior that disables delivery and clears
      bot_token_ciphertext, and no token echo in HTML.
  - id: AC-2
    text: Admins can create, update, clear, and validate users.slack_user_id from
      /ops/users, while Dev/TI and requester users cannot change Slack IDs.
  - id: AC-3
    text: The UI shows stored-token presence, workspace metadata, last update metadata,
      and last-known delivery health when available.
  deliverables:
  - Auth and app/routes_ops.py changes for admin-only Slack integration management
  - Slack integration template, nav, i18n, and required-scope guidance updates
  - shared/user_admin.py plus ops-users form changes for slack_user_id
  - Updated ops workflow and locale-switch tests
  risks:
  - Reusing /ops/users can accidentally widen Dev/TI permissions if route and template
    checks diverge.
  - Save and disconnect flows can accidentally leak token state back into rendered
    HTML or translated errors.
  - Locale-switch paths can regress if validation failures do not preserve the integration
    page URL.
  rollback:
  - Disable Slack in the DB and hide the new admin path if the UI flow regresses,
    while keeping the persisted schema.
  - Do not silently ignore unauthorized slack_user_id submissions; keep the permission
    failure explicit.
- phase_id: emission-dm-recipient-routing
  title: Emission-Time DM Recipient Routing
  objective: Replace webhook target selection with recipient-based DM routing while
    preserving the canonical payload, dedupe, and no-backfill contracts.
  status: planned
  in_scope:
  - Update shared/integrations.py to route from requester and current assignee, using
    active users with nonblank slack_user_id.
  - Collapse requester and assignee duplicates to one row with recipient_reason=requester_assignee
    and target_name=user:<recipient_user_id>.
  - Preserve the no-actor-suppression rule so requester or assignee recipients are
    not excluded just because they performed the action.
  - Persist routing_result values for created, suppressed_slack_disabled, suppressed_invalid_config,
    suppressed_notify_disabled, and suppressed_no_recipients, with routing_target_name
    always null.
  - Preserve duplicate reuse as read-only, including no repair after later enablement,
    assignment changes, or Slack ID edits.
  - Update emission logging and tests for recipient_target_count and no-recipient cases.
  out_of_scope:
  - Admin save and disconnect UI behavior.
  - Worker send-time Slack API calls.
  - Any new Slack event families or business payload changes.
  dependencies:
  - dm-persistence-runtime-foundation
  acceptance_criteria:
  - id: AC-1
    text: New eligible events create zero, one, or two slack_dm target rows exactly
      from the post-mutation ticket state, with requester or assignee collapse when
      they are the same AutoSac user and no actor-based self-notification suppression.
  - id: AC-2
    text: Zero-recipient outcomes persist integration_events and link rows but create
      no target rows, and routing_result is recorded as suppressed_no_recipients.
  - id: AC-3
    text: Duplicate event reuse never adds or rewrites recipient rows after later
      Slack config, Slack ID, or assignment changes.
  deliverables:
  - Refactored shared/integrations.py routing and target-row creation logic
  - Any shared/ticketing.py or caller updates needed to build DB-backed Slack runtime
    before emission
  - Updated Slack emission tests for recipient routing, collapse, and no-backfill
  risks:
  - Using stale config instead of the current DB snapshot can produce the wrong preview
    limit or routing result.
  - Duplicate reuse can accidentally backfill recipients if current eligibility leaks
    into reused events.
  - Assignment flows can regress if routing reads pre-mutation instead of post-mutation
    ticket state.
  rollback:
  - Keep Slack disabled in the DB and revert emission code if recipient routing regresses,
    leaving the DM schema intact.
  - Do not repair or synthesize historical recipient rows as part of rollback handling.
- phase_id: worker-dm-delivery-and-regression
  title: Worker DM Delivery and Regression Completion
  objective: Replace webhook posting with Slack Web API DM delivery, enforce the
    required auth and recipient failure semantics, and align docs and tests with
    the DB-backed DM contract.
  status: planned
  in_scope:
  - Update worker/main.py and worker/slack_delivery.py so each cycle reloads DB-backed
    Slack config and runs auth.test before recovery or claim work.
  - Resolve recipients at send time by recipient_user_id, then call conversations.open
    and chat.postMessage with Web API ok-response validation.
  - Update worker claim and result logging so recipient_user_id and recipient_reason
    are emitted alongside the delivery-state fields required by the PRD.
  - Classify global invalid-config, terminal recipient, and retryable failures, including
    Retry-After handling and no-Slack-call dead-lettering for missing or inactive
    recipients.
  - Update tests, README, .env.example, and deployment docs to remove webhook or
    SLACK_* runtime assumptions and describe the new DB-backed rollout posture.
  out_of_scope:
  - Inbound Slack interactions, OAuth, or user autodiscovery.
  - Historical backfill or mixed webhook/DM runtime support.
  - Unrelated repository-wide documentation cleanup.
  dependencies:
  - dm-persistence-runtime-foundation
  - admin-ui-and-user-mapping
  - emission-dm-recipient-routing
  acceptance_criteria:
  - id: AC-1
    text: The worker performs no claim, send, or stale-lock recovery work in cycles
      where auth.test shows auth-level or scope-level invalid config.
  - id: AC-2
    text: Successful delivery requires both conversations.open and chat.postMessage
      to return HTTP success and Slack ok=true, and send-time missing or inactive
      recipients dead-letter without Slack HTTP calls.
  - id: AC-3
    text: Docs, regression tests, and worker observability reflect one DB-backed Slack
      DM contract, including Retry-After handling, no-backfill behavior, config-first
      rollback, and recipient_user_id plus recipient_reason logging.
  deliverables:
  - Refactored worker/main.py and worker/slack_delivery.py for DB-backed DM delivery
  - Updated Slack delivery and hardening tests plus targeted docs changes
  - Final rollout notes for disabled-by-default enablement and disposable pre-launch
    Slack row handling
  risks:
  - Worker threads can keep stale settings if cycle-level runtime reload is incomplete.
  - Web API success classification can drift if HTTP and ok-response checks are split
    across helper paths.
  - Docs can leave old env-based guidance in place and cause operator drift after
    implementation lands.
  rollback:
  - Disable Slack in the DB and revert worker or doc changes if the DM delivery flow
    regresses, leaving the schema intact.
  - Do not reintroduce webhook delivery or env-backed routing as a rollback shortcut.
