services:
  - type: web
    name: autosac
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start_all.sh
    healthCheckPath: /healthz
    disk:
      name: autosac-disk
      mountPath: /opt/triage
      sizeGB: 5
    envVars:
      - key: APP_BASE_URL
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: autosac-db
          property: connectionString
      - key: CODEX_BIN
        value: codex
      - key: CODEX_API_KEY
        sync: false
      - key: UPLOADS_DIR
        value: /opt/triage/data/uploads
      - key: TRIAGE_WORKSPACE_DIR
        value: /opt/triage/triage_workspace
      - key: REPO_MOUNT_DIR
        value: /opt/triage/triage_workspace/app
      - key: MANUALS_MOUNT_DIR
        value: /opt/triage/triage_workspace/manuals
      - key: WORKER_POLL_SECONDS
        value: 10
      - key: CODEX_TIMEOUT_SECONDS
        value: 75

databases:
  - name: autosac-db
    plan: starter
    databaseName: autosac
    user: autosac
