  - phase_id: tests-and-regression-proofing
    title: Tests And Regression Proofing
    objective: Lock in the requested behavior with focused tests across auth, worker, bootstrap, docs, and HTMX flows.
    status: planned
    in_scope:
      - Add or update tests for browser redirect/CSRF behavior, cwd path resolution, malformed hashes, HTMX fragments, ticket-view invariants, AI validation, Codex transport, and bootstrap/docs checks.
      - Keep existing smoke-check and route-contract assertions passing.
    out_of_scope:
